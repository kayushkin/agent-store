# Dev preview subdomains: 1.dev.kayushkin.com, 2.dev.kayushkin.com, etc.
# 
# Setup:
#   1. Add DNS: *.dev.kayushkin.com → A record → server IP (Namecheap)
#   2. Copy this to /etc/nginx/sites-enabled/dev.kayushkin.com
#   3. sudo nginx -t && sudo systemctl reload nginx
#
# Port mapping: slot N → port 900N
#   slot 0 → 9000 → 0.dev.kayushkin.com
#   slot 1 → 9001 → 1.dev.kayushkin.com
#   slot 2 → 9002 → 2.dev.kayushkin.com

server {
    listen 80;
    server_name ~^(?<slot>\d+)\.dev\.kayushkin\.com$;

    # Optional: restrict to your IP only
    # allow YOUR_IP;
    # deny all;

    location / {
        set $backend_port "900${slot}";
        proxy_pass http://127.0.0.1:$backend_port;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # WebSocket support (for hot reload if using vite dev)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # Show slot info on 502 (server not started yet)
    error_page 502 @not_running;
    location @not_running {
        default_type text/html;
        return 502 '<html><body style="font-family:monospace;padding:2em">
            <h1>Dev slot $slot not running</h1>
            <p>No dev server on port 900$slot</p>
            <p>Start it with: <code>devserver.sh start $slot /path/to/build</code></p>
        </body></html>';
    }
}
